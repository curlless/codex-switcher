name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version to package during manual dry run (defaults to manifest version)"
        required: false
        type: string
      build_profile:
        description: "Build matrix to use for manual dispatch"
        required: false
        default: core
        type: choice
        options:
          - core
          - full
      publish:
        description: "Allow publish/release side effects during manual dispatch"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  tag-check:
    runs-on: ubuntu-24.04
    outputs:
      release_version: ${{ steps.meta.outputs.release_version }}
      publish_enabled: ${{ steps.meta.outputs.publish_enabled }}
      build_matrix: ${{ steps.meta.outputs.build_matrix }}
      build_profile: ${{ steps.meta.outputs.build_profile }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve release version and publish mode
        id: meta
        shell: bash
        env:
          INPUT_RELEASE_VERSION: ${{ inputs.release_version }}
          INPUT_BUILD_PROFILE: ${{ inputs.build_profile }}
          INPUT_PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          cargo_ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *\"([^\"]+)\".*/\1/')"
          npm_ver="$(python3 - <<'PY'
          import json
          with open("package.json", "r", encoding="utf-8") as fh:
              print(json.load(fh)["version"])
          PY
          )"

          echo "Cargo version: ${cargo_ver}"
          echo "NPM version: ${npm_ver}"

          [[ "${cargo_ver}" == "${npm_ver}" ]] || { echo "Cargo.toml ${cargo_ver} != package.json ${npm_ver}"; exit 1; }

          publish_enabled="false"
          release_version="${cargo_ver}"
          build_profile="core"
          build_matrix='[
            {"runner":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","binary":"codex-switcher"},
            {"runner":"ubuntu-24.04-arm","target":"aarch64-unknown-linux-gnu","binary":"codex-switcher"},
            {"runner":"windows-2025","target":"x86_64-pc-windows-msvc","binary":"codex-switcher.exe"}
          ]'

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?$ ]] \
              || { echo "Tag '${GITHUB_REF_NAME}' does not match vX.Y.Z or vX.Y.Z-alpha.N"; exit 1; }

            tag_ver="${GITHUB_REF_NAME#v}"
            echo "Tag version: ${tag_ver}"

            [[ "${tag_ver}" == "${cargo_ver}" ]] || { echo "Tag ${tag_ver} != Cargo.toml ${cargo_ver}"; exit 1; }
            [[ "${tag_ver}" == "${npm_ver}" ]] || { echo "Tag ${tag_ver} != package.json ${npm_ver}"; exit 1; }

            release_version="${tag_ver}"
            publish_enabled="true"
            build_profile="full"
            build_matrix='[
              {"runner":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","binary":"codex-switcher"},
              {"runner":"ubuntu-24.04-arm","target":"aarch64-unknown-linux-gnu","binary":"codex-switcher"},
              {"runner":"macos-15-large","target":"x86_64-apple-darwin","binary":"codex-switcher"},
              {"runner":"macos-15","target":"aarch64-apple-darwin","binary":"codex-switcher"},
              {"runner":"windows-2025","target":"x86_64-pc-windows-msvc","binary":"codex-switcher.exe"}
            ]'
          else
            if [[ -n "${INPUT_RELEASE_VERSION:-}" ]]; then
              [[ "${INPUT_RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?$ ]] \
                || { echo "Manual release_version '${INPUT_RELEASE_VERSION}' does not match X.Y.Z or X.Y.Z-alpha.N"; exit 1; }
              [[ "${INPUT_RELEASE_VERSION}" == "${cargo_ver}" ]] \
                || { echo "Manual release_version ${INPUT_RELEASE_VERSION} != Cargo.toml ${cargo_ver}"; exit 1; }
              release_version="${INPUT_RELEASE_VERSION}"
            fi

            if [[ "${INPUT_BUILD_PROFILE:-core}" == "full" ]]; then
              build_profile="full"
              build_matrix='[
                {"runner":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","binary":"codex-switcher"},
                {"runner":"ubuntu-24.04-arm","target":"aarch64-unknown-linux-gnu","binary":"codex-switcher"},
                {"runner":"macos-15-large","target":"x86_64-apple-darwin","binary":"codex-switcher"},
                {"runner":"macos-15","target":"aarch64-apple-darwin","binary":"codex-switcher"},
                {"runner":"windows-2025","target":"x86_64-pc-windows-msvc","binary":"codex-switcher.exe"}
              ]'
            fi

            if [[ "${INPUT_PUBLISH:-false}" == "true" ]]; then
              publish_enabled="true"
              build_profile="full"
              build_matrix='[
                {"runner":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","binary":"codex-switcher"},
                {"runner":"ubuntu-24.04-arm","target":"aarch64-unknown-linux-gnu","binary":"codex-switcher"},
                {"runner":"macos-15-large","target":"x86_64-apple-darwin","binary":"codex-switcher"},
                {"runner":"macos-15","target":"aarch64-apple-darwin","binary":"codex-switcher"},
                {"runner":"windows-2025","target":"x86_64-pc-windows-msvc","binary":"codex-switcher.exe"}
              ]'
            fi

            echo "Manual dispatch release version: ${release_version}"
            echo "Manual dispatch publish enabled: ${publish_enabled}"
            echo "Manual dispatch build profile: ${build_profile}"
          fi

          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "publish_enabled=${publish_enabled}" >> "${GITHUB_OUTPUT}"
          echo "build_profile=${build_profile}" >> "${GITHUB_OUTPUT}"
          {
            echo "build_matrix<<EOF"
            echo "${build_matrix}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  verify:
    needs: tag-check
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@cargo-audit
      - uses: taiki-e/install-action@cargo-nextest
      - name: Cache cargo bin
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
          restore-keys: |
            ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: ${{ runner.os }}-verify-${{ hashFiles('rust-toolchain.toml') }}
      - name: Run checks
        run: scripts/check.sh

  build:
    needs: [tag-check, verify]
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJson(needs.tag-check.outputs.build_matrix) }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo bin
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Cargo build
        shell: bash
        run: |
          set -euo pipefail
          cargo fetch --locked
          cargo build --release --target ${{ matrix.target }} --bin codex-switcher --locked
          echo "Build output:"
          ls -la target/${{ matrix.target }}/release || true
      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: codex-switcher-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  package:
    needs: [build, verify]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Cache cargo bin
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
          restore-keys: |
            ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.tag-check.outputs.release_version }}"
          scripts/release-artifacts.sh "${version}" dist/artifacts dist
          scripts/verify-artifacts.sh "${version}" dist

      - name: Commit checksums to repo
        if: ${{ needs.tag-check.outputs.publish_enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.tag-check.outputs.release_version }}"
          
          # Safety gate: only commit to production repository
          if [[ "${GITHUB_REPOSITORY}" != "1Voin1/codex-switcher" ]]; then
            echo "Skipping checksum commit: not production repository (current: ${GITHUB_REPOSITORY})"
            echo "Checksums generated but not committed to repo"
            ls -la dist/checksums/
            exit 0
          fi
          
          echo "Committing checksums to ${GITHUB_REPOSITORY}..."
          
          # Copy checksums to repo
          cp dist/checksums/SHA256SUMS "checksums/v${version}.txt"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Fetch and checkout default branch (workflow starts in detached HEAD from tag)
          default_branch="${{ github.event.repository.default_branch }}"
          if [[ -z "${default_branch}" ]]; then
            default_branch="develop"
          fi
          git fetch origin "${default_branch}"
          git checkout "${default_branch}"
          
          # Commit and push
          git add "checksums/v${version}.txt"
          git commit -m "chore: add checksums for v${version}"
          git push origin "${default_branch}"

      - name: Publish to crates.io
        if: ${{ needs.tag-check.outputs.publish_enabled == 'true' && !contains(needs.tag-check.outputs.release_version, '-') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Safety gate: only publish from production repository
          if [[ "${GITHUB_REPOSITORY}" != "1Voin1/codex-switcher" ]]; then
            echo "Skipping crates.io publish: not production repository (current: ${GITHUB_REPOSITORY})"
            exit 0
          fi
          
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "Warning: CARGO_REGISTRY_TOKEN not set, skipping crates.io publish"
            echo "Add your token at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 0
          fi
          
          echo "Publishing to crates.io from ${GITHUB_REPOSITORY}..."
          cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}"

      - name: Publish to npm
        if: ${{ needs.tag-check.outputs.publish_enabled == 'true' && !contains(needs.tag-check.outputs.release_version, '-') }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Safety gate: only publish from production repository
          if [[ "${GITHUB_REPOSITORY}" != "1Voin1/codex-switcher" ]]; then
            echo "Skipping npm publish: not production repository (current: ${GITHUB_REPOSITORY})"
            exit 0
          fi
          
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "Warning: NPM_TOKEN not set, skipping npm publish"
            echo "Add your token at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 0
          fi
          
          echo "Publishing to npm from ${GITHUB_REPOSITORY}..."
          version="${{ needs.tag-check.outputs.release_version }}"
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          
          # Publish platform packages
          for pkg in dist/npm-packages/codex-switcher-*-*.tgz; do
            npm publish "$pkg" --access public
          done

          # Publish main wrapper package last so optional platform packages
          # already exist in the registry by the time consumers install it.
          npm publish dist/npm-packages/codex-switcher-${version}.tgz --access public

      - name: Create GitHub release
        if: ${{ needs.tag-check.outputs.publish_enabled == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*
            dist/npm-packages/*.tgz
            dist/homebrew/*.rb
            dist/cargo/*.crate
            dist/checksums/*
          generate_release_notes: true
          prerelease: ${{ contains(needs.tag-check.outputs.release_version, '-') }}
